name: D-INVEST 加密货币每日分析

on:
  schedule:
    # 6 次/天，4 小时间隔，避开美股 cron 时段（13:10/14:10/20:15/21:15 UTC）
    - cron: '7 0 * * *'
    - cron: '7 4 * * *'
    - cron: '7 8 * * *'
    - cron: '7 12 * * *'
    - cron: '7 16 * * *'
    - cron: '7 22 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: dinvest-crypto-analysis
  cancel-in-progress: false

env:
  DISCLAIMER_TEXT: "⚠️ 以下分析仅供参考，不构成投资建议，不得作为交易指令。"
  REPORT_TYPE: full

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 ccxt（CCXT crypto fetcher 依赖）
        run: |
          pip install ccxt

      - name: 创建必要目录和配置
        env:
          CRYPTO_STOCK_LIST: ${{ vars.DINVEST_CRYPTO_LIST }}
        run: |
          mkdir -p data logs reports
          {
            echo "STOCK_LIST=${CRYPTO_STOCK_LIST}"
            echo "MARKET_REVIEW_ENABLED=false"
            echo "YFINANCE_PRIORITY=0"
            echo "CCXT_PRIORITY=0"
            echo "EFINANCE_PRIORITY=99"
            echo "AKSHARE_PRIORITY=99"
            echo "TUSHARE_PRIORITY=99"
            echo "PYTDX_PRIORITY=99"
            echo "BAOSTOCK_PRIORITY=99"
            echo "LONGBRIDGE_PRIORITY=98"
            echo "CCXT_EXCHANGE=kraken"
            echo "NOTIFY_MIN_SCORE=70"
            echo "NOTIFY_SKIP_WATCH=true"
            echo "DSA_MODE=true"
          } > .env

      - name: 执行加密货币分析
        env:
          GEMINI_API_KEY: ${{ secrets.DINVEST_GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.DINVEST_GEMINI_MODEL || 'gemini-2.5-flash' }}
          AIHUBMIX_KEY: ${{ secrets.DINVEST_AIHUBMIX_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.DINVEST_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003892027999"
          STOCK_LIST: ${{ vars.DINVEST_CRYPTO_LIST }}
          REPORT_TYPE: ${{ github.event.inputs.mode || 'full' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'true' }}
          NOTIFICATION_FOOTER: "⚠️ 仅供参考，不构成投资建议，不得作为交易指令 | D-INVEST-加密货币 | ${{ github.run_id }}"
        run: |
          echo "=== D-INVEST 加密货币分析启动 ==="
          echo "触发时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "标的: ${STOCK_LIST}"
          python main.py

      - name: 提交报告到 reports 分支（方案A：Mac Mini cron 拉取入库）
        if: success()
        run: |
          set -e
          # 1. 备份当前报告到 /tmp（切分支会清 workspace）
          mkdir -p /tmp/dsa-reports-out
          cp -f reports/*.md /tmp/dsa-reports-out/ 2>/dev/null || true
          ls /tmp/dsa-reports-out/ || { echo "no reports to commit"; exit 0; }

          # 2. 清理 workspace 中 git untracked 文件（.env / data / logs / reports），避免 checkout 冲突
          git clean -fdx
          git checkout .

          # 3. 切到 reports 分支
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin reports
          git checkout -B reports origin/reports

          # 4. 写入报告（按日期分目录避免冲突）
          DATE_DIR="crypto/$(date -u '+%Y/%m/%d')"
          mkdir -p "$DATE_DIR"
          cp -f /tmp/dsa-reports-out/*.md "$DATE_DIR/" 2>/dev/null || true

          git add "$DATE_DIR"
          if git diff --cached --quiet; then
            echo "no new content"
            exit 0
          fi
          git commit -m "chore(reports): crypto $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin reports

      - name: 上传分析日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dinvest-crypto-logs-${{ github.run_id }}
          path: |
            logs/
            reports/
          retention-days: 7
