name: D-INVEST 每日股票分析推送

on:
    schedule:
    - cron: '10 13 * * 1-5'
    - cron: '10 14 * * 1-5'
    - cron: '15 20 * * 1-5'
    - cron: '15 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: dinvest-stock-analysis
  cancel-in-progress: false

env:
  DISCLAIMER_TEXT: "⚠️ 以下分析仅供参考，不构成投资建议，不得作为交易指令。"
  REPORT_TYPE: full

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录和配置
        run: |
          mkdir -p data logs reports
          echo "STOCK_LIST=${{ vars.DINVEST_STOCK_LIST }}" > .env

      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.DINVEST_GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.DINVEST_GEMINI_MODEL || 'gemini-2.5-flash' }}
          AIHUBMIX_KEY: ${{ secrets.DINVEST_AIHUBMIX_KEY }}
          OPENAI_API_KEY: ${{ secrets.DINVEST_OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.DINVEST_OPENAI_BASE_URL || secrets.DINVEST_OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.DINVEST_OPENAI_MODEL || secrets.DINVEST_OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.DINVEST_ANTHROPIC_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.DINVEST_TUSHARE_TOKEN }}
          BRAVE_API_KEYS: ${{ secrets.DINVEST_BRAVE_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.DINVEST_TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.DINVEST_SERPAPI_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.DINVEST_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003892027999"
          REPORT_TYPE: ${{ github.event.inputs.mode || 'full' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          NOTIFICATION_FOOTER: "⚠️ 仅供参考，不构成投资建议，不得作为交易指令 | D-INVEST-投资分析 | ${{ github.run_id }}"
          STOCK_LIST: ${{ vars.DINVEST_STOCK_LIST }}
        run: |
          echo "=== D-INVEST 每日分析启动 ==="
          echo "触发时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "报告类型: ${REPORT_TYPE}"
          echo "目标频道: ${TELEGRAM_CHAT_ID}"
          python main.py

      - name: 上传分析日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dinvest-analysis-logs-${{ github.run_id }}
          path: |
            logs/
            reports/
          retention-days: 7
